#
# ✅【核心修复】添加 permissions 声明（解决 403 关键！）
# 🔧【最佳实践】固定所有 action 版本（避免 @master 风险）
# ⚠️【重要】所有 xuxin1955 路径已替换为 gitpwz
#
name: Build_imm_高通410系列

# ✅【安全加固】仅允许在 gitpwz 仓库触发 workflow
on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

# ✅【关键权限】必须添加！解决 release 403 问题
permissions:
  contents: write  # 允许创建 release
  actions: write   # 允许管理 workflow runs

env:
  # 🔧【路径修正】确保指向你的 fork 仓库
  REPO_URL: https://github.com/gitpwz/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 'config/8916m.config'
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    # ✅【安全过滤】仅在你的仓库运行
    if: github.repository_owner == 'gitpwz'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4  # 🔧 固定 v4 版本
        
    - name: Show hardware info
      run: |
        chmod 755 ./scripts/show_hardware_info.sh
        ./scripts/show_hardware_info.sh
  
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@v1.3.0  # 🔧 固定版本
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
        
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        # 🔧【路径修正】使用你的 fork 中的依赖列表
        sudo -E apt-get -y install $(curl -fsSL https://raw.githubusercontent.com/gitpwz/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)
        
        # 🔧【路径修正】使用你的 fork 中的 mkbootimg
        wget https://raw.githubusercontent.com/gitpwz/depend_ubuntu2204_openwrt/main/mkbootimg_10.0.0+r36-9_all.deb
        sudo dpkg -i mkbootimg_10.0.0+r36-9_all.deb
        sudo apt-get install -f -y
        
        # ⚠️【验证】确保 mkbootimg 可用（调试用）
        mkbootimg --help || true
        MKBOOTIMG_PATH=$(which mkbootimg)
        echo "mkbootimg path: $MKBOOTIMG_PATH"
        
        sudo timedatectl set-timezone "$TZ"
        sudo chmod 777 /mnt
        df -hT
        
    - name: Ensure Python build tools
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install Unidecode pyelftools
        
    - name: Clone source code
      working-directory: /mnt
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Custom files
      run: cp -r files openwrt/files

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: Update istore
      working-directory: openwrt
      run: |
       ./scripts/feeds update istore
       ./scripts/feeds install -d y -p istore luci-app-store
        

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a -f

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
    - name: SSH connection to Actions
      uses: csexton/debugger-action@v1  # 🔧 固定版本
      if: (github.event.inputs.ssh == 'true') && (github.event.inputs.ssh != 'false')
      
    - name: Config defconfig
      run: |
       cd openwrt
       make defconfig
       
    - name: Download package
      run: |
        cd openwrt
        make download -j4 V=s
        # 🔧 优化：仅删除空文件
        find dl -size 0 -delete

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 🔧 优化：安全获取设备名
        DEVICE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' || echo "unknown")
        echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        cat > release.txt <<EOF
## ImmortalWrt 24.10 高通410系列
- 管理地址: 192.168.1.1
- 默认用户: root
- 默认密码: 空
EOF
        echo "status=success" >> $GITHUB_OUTPUT
        
    # ✅【终极修复】使用 v1 版本 + 自动权限
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1  # 🔧 固定 v1 版本
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        # ✅ 不需要 GITHUB_TOKEN！系统自动授权（因 permissions 已声明）
        
    # ⚠️【重要】清理策略（避免仓库膨胀）
    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2  # 🔧 固定版本
      with:
        retain_days: 1
        keep_minimum_runs: 3
        
    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v1  # 🔧 固定版本
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
